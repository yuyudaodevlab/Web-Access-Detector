name: Release Build

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven' # 💡 Tip: This single line replaces your entire manual cache step!

      - name: Build Fat JAR
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: Rename JAR for specific OS
        shell: bash
        run: mv target/access-detector.jar target/access-detector-${{ runner.os }}.jar

      - name: Create GitHub Release and upload JAR
        uses: softprops/action-gh-release@v2
        with:
          name: "AccessDetector ${{ github.ref_name }}"
          body: |
            ## AccessDetector ${{ github.ref_name }}

            ### Download
            Download `access-detector.jar` and run with the commands below.

            ### Requirements
            - Java 17 or later

            ### Usage
            ```bash
            # Basic usage (port 8080)
            java -jar access-detector.jar -p 8080

            # Detect access via Cloudflare CDN
            java -jar access-detector.jar -p 80 -cf -l log.txt

            # Expose publicly via ngrok
            java -jar access-detector.jar -p 8080 -ngrok

            # Redirect all requests to another URL
            java -jar access-detector.jar -p 8080 -r [https://example.com](https://example.com)

            # Serve a file while logging access
            java -jar access-detector.jar -p 8080 -file index.html -l access.txt
            ```
          files: target/access-detector-${{ runner.os }}.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
